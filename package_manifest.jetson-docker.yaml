# mapping_rbnx — deployment target: arm64 Jetson + docker.
#
# Same package, code, capabilities, and config schema as the default
# package_manifest.yaml (see it for the full algo / sensors / map_id /
# map_mode docs). The ONLY difference is the build/start target:
#   build → docker/Dockerfile.jetson (NVIDIA L4T base, ROS2 in image)
#   start → docker run (CPU rtabmap; no nvidia runtime needed)
#
# Select this file from a deploy manifest entry:
#   service:
#     - name: mapping
#       url: https://github.com/enkerewpo/mapping_rbnx
#       manifest: package_manifest.jetson-docker.yaml
#       config: { algo: rtabmap, sensors: {...}, map_id: lab_3f }
manifestVersion: 1

package:
  name: com.robonix.service.mapping
  version: 0.4.0
  vendor: robonix
  description: SLAM mapping service (Jetson + docker target).
  license: MulanPSL-2.0

build: RBNX_BUILD_TARGET=jetson-docker bash scripts/build.sh
start: ROBONIX_MAPPING_FORCE=docker bash scripts/start.sh

capabilities:
  - name: robonix/service/map/driver
  - name: robonix/service/map/occupancy_grid
  - name: robonix/service/map/pointcloud
  - name: robonix/service/map/pose
  - name: robonix/service/map/odom
