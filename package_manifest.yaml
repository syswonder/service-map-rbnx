# mapping_rbnx — SLAM mapping service.
#
# Algo + sensor inputs are config-driven (RBNX_CONFIG_FILE → mapping.yaml-like
# block from the deploy manifest). One package, multiple algorithms:
#
#   algo: rtabmap   — ROS2-native graph SLAM (apt-installable). Sensor
#                     inputs are NOT hardcoded: the deploy manifest's
#                     `sensors:` block decides which of {lidar2d,
#                     lidar3d, rgb, rgbd, odom, imu} are wired in.
#                     Examples:
#                       webots tiago        — sensors.lidar2d + sensors.rgbd + odom
#                       real robot (mid360) — sensors.lidar3d + sensors.rgbd + odom + imu
#                     The launch file branches on what's enabled
#                     (`subscribe_scan` for 2D LaserScan,
#                     `subscribe_scan_cloud` for 3D PointCloud2,
#                     `subscribe_rgb`+`subscribe_depth` for RGBD).
#   algo: dlio      — Direct LiDAR-Inertial Odometry. Pure 3D Livox +
#                     IMU path. Needs slam_alt_ws colcon ws bind-mounted
#                     at /ws/install.
#   algo: fastlio2  — [BROKEN: drift] kept reachable for repro/debug
#                     only. Needs FASTLIO2_ROS2 colcon build.
#
# slam_toolbox + cartographer were dropped after rtabmap consistently
# beat them in head-to-head testing.
#
# Sensor selection drives BOTH which atlas contracts atlas_bridge
# resolves AND which subscriptions the launch file enables — there is
# no implicit "if 2D scan exists, use it" coupling. Specify what the
# robot has; the package wires the rest.
#
# Outputs (FIXED capability surface — same set declared regardless
# of which algo is selected; consumers care about contracts, not algos):
#   robonix/service/map/occupancy_grid → nav_msgs/OccupancyGrid
#   robonix/service/map/pointcloud     → sensor_msgs/PointCloud2
#   robonix/service/map/pose           → geometry_msgs/PoseWithCovarianceStamped
#                                        (SLAM-corrected, map frame, can
#                                         jump on loop closure)
#   robonix/service/map/odom           → nav_msgs/Odometry
#                                        (SLAM-corrected, odom frame,
#                                         continuous between closures)
# Algos that don't natively publish a contract spawn an adapter node
# in their launch file so the topic still exists at the bound name.
manifestVersion: 1

package:
  name: robonix.service.mapping
  version: 0.4.0
  description: SLAM mapping service. Algo + sensor inputs config-driven.
  tags: [service, mapping, slam, rtabmap, ros2]
  maintainers: [wheatfox <wheatfox17@icloud.com>]
  license: MulanPSL-2.0

# Deployment target: x86_64 + docker (ROS2 in image). This is the default
# manifest. Sibling manifests select other targets via the deploy entry's
# `manifest:` field (rbnx loads that file instead of this one):
#   package_manifest.jetson-docker.yaml   arm64 Jetson + docker (L4T base)
#   package_manifest.jetson-native.yaml   arm64 Jetson + host ROS2 (no docker)
# All three share this package's code + capabilities; only build/start differ.
build: bash scripts/build.sh
start: bash scripts/start.sh

# ── config (deploy `config:` block → Driver(CMD_INIT)) ──────────────────────
# Required:
#   algo:    rtabmap | dlio | fastlio2[broken]      (rtabmap recommended)
#   sensors: { lidar2d|lidar3d|rgb|depth|imu|odom: bool }  what the robot has
#   rtabmap_inputs: [lidar|rgbd|odom]  which resolved streams feed RTAB-Map
#   occupancy_sources: [lidar|depth]  explicit 2D occupancy policy (optional;
#                                      legacy deploys retain automatic choice)
# Frames / time (optional; defaults = webots tiago):
#   base_frame, odom_frame, map_frame, use_sim_time
# Map persistence (optional; rtabmap only):
#   map_id:    stable id for this map. Bind the SAME id in the scene service
#              so its per-map_id semantic store anchors to this spatial map.
#              Omit → ephemeral (db wiped each boot — the legacy behaviour).
#   map_mode:  mapping (default; build/extend) | localization (load read-only,
#              stable map frame across restarts — needs a saved map_id first).
#   reset_map: true to start a named map fresh (mapping mode only).
# Saved maps live under {MAPPING_MAPS_DIR}/{map_id}/ as rtabmap.db +
# occupancy.pgm/.yaml/.png + cloud.pcd + meta.yaml (offline-previewable).

# Only list what we actually declare on atlas at runtime. Aspirational
# entries (status / save_map / load_map / switch_mode / set_initial_pose)
# were removed — they shipped as "TODO" markers but boot ran fine without
# them, so manifest claims and runtime behaviour drifted apart. The
# moment any of those gRPC services is implemented, add it back AND
# wire the DeclareInterface call in atlas_bridge.
stop: bash scripts/stop.sh

capabilities:
  - name: robonix/service/map/driver
  - name: robonix/service/map/occupancy_grid
  - name: robonix/service/map/pointcloud
  - name: robonix/service/map/pose
  - name: robonix/service/map/odom
  - name: robonix/service/map/save_map
  - name: robonix/service/map/list_maps
  - name: robonix/service/map/load_map
  - name: robonix/service/map/pose_estimate
  - name: robonix/service/map/switch_mode
