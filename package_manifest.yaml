# mapping_rbnx — SLAM mapping service.
#
# Algo + sensor inputs are config-driven (RBNX_CONFIG_FILE → mapping.yaml-like
# block from the deploy manifest). One package, multiple algorithms:
#
#   algo: rtabmap   — DEFAULT. 2D lidar + RGBD fusion → /map +
#                     /rtabmap/cloud_map. ROS2 native (apt-installable).
#                     Webots and real-robot 2D scenarios.
#   algo: dlio      — Direct LiDAR-Inertial Odometry. Real-robot 3D
#                     Livox + IMU path. Needs slam_alt_ws colcon ws
#                     bind-mounted at /ws/install.
#   algo: fastlio2  — [BROKEN: drift] kept reachable for repro/debug
#                     only. Needs FASTLIO2_ROS2 colcon build.
#
# slam_toolbox + cartographer were dropped after rtabmap consistently
# beat them in head-to-head testing.
#
# Sensor selection (which atlas contracts the bridge queries) is also
# config-driven — `sensors.lidar2d: true` makes mapping pull
# robonix/primitive/lidar/lidar via atlas instead of hardcoding the topic.
#
# Outputs (FIXED capability surface — same set declared regardless
# of which algo is selected; consumers care about contracts, not algos):
#   robonix/service/map/occupancy_grid → nav_msgs/OccupancyGrid
#   robonix/service/map/pointcloud     → sensor_msgs/PointCloud2
# Algos that don't natively publish a contract spawn an adapter node
# in their launch file so the topic still exists at the bound name.
manifestVersion: 1

package:
  name: com.robonix.service.mapping
  version: 0.4.0
  vendor: robonix
  description: SLAM mapping service. Algo + sensor inputs config-driven.
  license: MulanPSL-2.0

build: bash scripts/build.sh
start: bash scripts/start.sh

# Only list what we actually declare on atlas at runtime. Aspirational
# entries (status / save_map / load_map / switch_mode / set_initial_pose)
# were removed — they shipped as "TODO" markers but boot ran fine without
# them, so manifest claims and runtime behaviour drifted apart. The
# moment any of those gRPC services is implemented, add it back AND
# wire the DeclareInterface call in atlas_bridge.
capabilities:
  - name: robonix/service/map/occupancy_grid
  - name: robonix/service/map/pointcloud
