# mapping_rbnx — FASTLIO2 SLAM (native) + Atlas bridge (primitive discovery).
manifestVersion: 1

build:
  script: scripts/build.sh

package:
  id: com.robonix.pkg.mapping
  name: mapping_rbnx
  version: 0.3.0
  vendor: robonix
  description: FASTLIO2 SLAM with Atlas-discovered primitives (no hardcoded topics).
  license: MulanPSL-2.0

nodes:
  - id: com.robonix.mapping.fastlio2
    type: shell
    start: |
      set -e
      PKG="$(pwd)"
      source /opt/ros/${ROS_DISTRO:-humble}/setup.bash
      if [[ -f "${HOME}/wheatfox/packages/mid360_drv/install/setup.bash" ]]; then
        source "${HOME}/wheatfox/packages/mid360_drv/install/setup.bash"
      fi
      if [[ -f "${HOME}/wheatfox/packages/mapping_rbnx_ws/install/setup.bash" ]]; then
        source "${HOME}/wheatfox/packages/mapping_rbnx_ws/install/setup.bash"
      fi
      export RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}

      # (1) atlas_bridge in background: RegisterNode + DeclareInterface + QueryNodes
      # It writes /tmp/lio_resolved.yaml with Atlas-discovered topics.
      rm -f /tmp/lio_resolved.yaml
      (
        export PYTHONPATH="$PKG/src:$PKG/proto_gen:${PYTHONPATH:-}"
        python3 -m mapping_rbnx.atlas_bridge 2>&1 | sed "s/^/[bridge] /"
      ) &
      BRIDGE_PID=$!
      echo "[mapping_rbnx] atlas_bridge PID=$BRIDGE_PID"
      trap "kill -TERM $BRIDGE_PID 2>/dev/null || true; exit" INT TERM

      # (2) Wait up to 15s for Atlas-resolved config
      for i in $(seq 1 30); do
        if [[ -f /tmp/lio_resolved.yaml ]]; then break; fi
        sleep 0.5
      done
      if [[ -f /tmp/lio_resolved.yaml ]]; then
        echo "[mapping_rbnx] using Atlas-resolved lio config:"
        grep -E "^lidar_topic|^imu_topic" /tmp/lio_resolved.yaml | sed "s/^/  /"
      else
        echo "[mapping_rbnx] WARN: bridge did not write /tmp/lio_resolved.yaml in 15s — using installed default"
      fi

      # (3) SLAM launch (lio_node + pgo_node + pc2grid + cloud_accumulator)
      exec ros2 launch "$PKG/launch/slam_mapping_native.launch.py"

interfaces:
  provides:
    - id: robonix/prm/base/odom
    - id: robonix/srv/slam/status
    - id: robonix/srv/slam/save_map
    - id: robonix/srv/slam/load_map
    - id: robonix/srv/slam/switch_mode
    - id: robonix/srv/slam/set_initial_pose
    - id: robonix/srv/common/map/pointcloud
    - id: robonix/srv/common/map/occupancy_grid
    - id: robonix/srv/common/map/scan_2d
  consumes:
    - id: robonix/prm/sensor/lidar3d
    - id: robonix/prm/sensor/imu
